name: Build plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to publish
        required: true
        default: v1.1.1

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test and build
        run: bash ./gradlew :plugin:testDebugUnitTest :plugin:assembleDebug :plugin:assembleRelease

      - name: Upload plugin
        uses: actions/upload-artifact@v4
        with:
          name: Linovelib-TW-1.1.1
          path: plugin/build/outputs/apk/debug/*.lnrp

      - name: Publish GitHub release
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          cp plugin/build/outputs/apk/debug/plugin-debug.apk.lnrp "Linovelib-TW-${VERSION}.apk.lnrp"
          gh release create "$RELEASE_TAG" "Linovelib-TW-${VERSION}.apk.lnrp" --title "Linovelib TW ${VERSION}" --notes "修正作者與作品標籤點擊後未顯示相關小說；改為直接讀取 Linovelib 的作者頁與標籤分類頁。支援 LightNovelReader 1.2.0、1.2.1 alpha，API 2。"
