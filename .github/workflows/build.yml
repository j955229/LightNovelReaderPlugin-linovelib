name: Build plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test and build
        run: bash ./gradlew :plugin:testDebugUnitTest :plugin:assembleDebug

      - name: Upload plugin
        uses: actions/upload-artifact@v4
        with:
          name: Linovelib-TW-1.0.17
          path: plugin/build/outputs/apk/debug/*.lnrp
