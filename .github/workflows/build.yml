name: Build plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to publish
        required: true
        default: v1.0.20

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test and build
        run: bash ./gradlew :plugin:testDebugUnitTest :plugin:assembleDebug

      - name: Upload plugin
        uses: actions/upload-artifact@v4
        with:
          name: Linovelib-TW-1.0.20
          path: plugin/build/outputs/apk/debug/*.lnrp

      - name: Publish GitHub release
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          cp plugin/build/outputs/apk/debug/plugin-debug.apk.lnrp "Linovelib-TW-${VERSION}.apk.lnrp"
          gh release create "$RELEASE_TAG" "Linovelib-TW-${VERSION}.apk.lnrp" --title "Linovelib TW ${VERSION}" --notes "相容 LightNovelReader 1.2.0 與 1.2.1（API 2）。修正直接跳轉搜尋、EPUB 圖片 HTTP 403、取消後繼續請求與重複連線監測，並延長章節記憶體快取；完整測試全部通過。"
